name: update-setlists

# 매주 토요일 오전(KST) 자동 실행 + 언제든 수동 실행(Run workflow) 가능
on:
  schedule:
    - cron: "0 22 * * 5" # 매주 금요일 22:00 UTC = 토요일 07:00 KST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # apt 의 yt-dlp 는 너무 오래돼 영상 풀추출(업로드일)이 깨질 수 있어 최신판 사용
      - name: Install yt-dlp (latest)
        run: |
          pipx install yt-dlp || python3 -m pip install --user -U yt-dlp
          yt-dlp --version

      - name: Scrape & parse
        run: node scripts/update-setlists.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/setlists.json data/intouch.json data/upload-dates.json
            git commit -m "chore: update setlists $(date -u +%Y-%m-%d)"
            git push
          else
            echo "변경 없음"
          fi
